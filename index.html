<!DOCTYPE html>
<html>
<head>
    <title>Topzi Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            padding: 20px;
            background: #000;
            color: orange;
        }

        .card {
            background: #222;
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255,140,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .price {
            color: orange;
            font-size: 22px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: orange;
            color: black;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🔥 Topzi Services 🔥</h1>

    <div class="card">
        <h2>Создание сайта</h2>
        <p class="price">5000₸</p>
        <a href="#" class="btn">Связаться</a>
    </div>

    <div class="card">
        <h2>Дизайн аватарки</h2>
        <p class="price">2000₸</p>
        <a href="#" class="btn">Связаться</a>
    </div>

</body>
</html>
